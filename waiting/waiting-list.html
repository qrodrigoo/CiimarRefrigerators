<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waiting List</title>
  <link rel="stylesheet" href="waiting-style.css" />
  <script type="module" src="waiting-script.js" defer></script>
</head>
<body>
  <button id="back-button" class="back-button">← Back</button>

  <div class="waiting-container">
    <h1>Waiting List</h1>
    <div id="waiting-list" class="waiting-list"></div>
  </div>

  <!-- Custom Confirm Modal -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal-form" style="max-width:380px;">
      <h2 id="confirm-title">Confirm</h2>
      <p id="confirm-message" style="text-align:center;color:#374151;margin:4px 0 8px;"></p>
      <div class="modal-actions">
        <button id="confirm-cancel-btn" class="cancel">Cancel</button>
        <button id="confirm-ok-btn" class="accept">Confirm</button>
      </div>
    </div>
  </div>
</body>
</html>
