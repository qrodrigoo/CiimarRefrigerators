<!-- fridge.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fridge Page</title>
  <link rel="stylesheet" href="fridge-style.css" />
  <script type="module" src="fridge-script.js" defer></script>
</head>
<body>
  <div class="fridge-container">
    <div class="top-bar">
      <button id="back-button" class="back-button">← Back</button>
      <input
        type="text"
        id="search-input"
        placeholder="Search by name, project and container type..."
        class="search-input"
      />
    </div>

    <div class="fridge-header">
      <h1 id="fridge-label"></h1>
    </div>

    <div class="door-grid" id="door-grid"></div>

    <p class="no-samples" id="no-samples" style="display: none">No samples found.</p>

    <!-- FAB Buttons -->
    <div class="fab-menu">
      <button id="show-add-form" class="fab-button add">+</button>
      <button id="show-rack-form" class="fab-button rack full">Add Rack</button>
      <button id="show-box-form" class="fab-button box full">Add Box</button>
    </div>

    <!-- Sample Detail Modal -->
    <div class="modal-overlay" id="sample-detail-modal">
      <div class="modal-form">
        <h2>Sample Details</h2>
        <div id="sample-details"></div>
        <div class="modal-actions">
          <button id="edit-sample" class="edit">Edit</button>
          <button id="transfer-sample" class="transfer">Transfer</button>
          <button id="delete-sample" class="delete">Delete</button>
          <button id="close-sample-modal" class="close">Close</button>
        </div>
      </div>
    </div>

    <!-- Add/Edit Sample Modal -->
    <div class="modal-overlay" id="sample-form-modal">
      <form class="modal-form" id="sample-form">
        <h2 id="form-title">Add New Sample</h2>
        <input type="text" placeholder="Description *" id="sample-name" required />
        <div class="project-autocomplete">
          <input type="text" placeholder="Project *" id="sample-project" required autocomplete="off" />
          <ul class="project-dropdown" id="project-dropdown"></ul>
        </div>
        <select id="sample-door" required>
          <option value="">Door *</option>
        </select>
        <input type="number" placeholder="Quantity *" id="sample-quantity" required value="1" />
        <select id="location-type" required>
          <option value="door">Store in: Door</option>
          <option value="rack">Store in: Rack</option>
          <option value="box">Store in: Box</option>
        </select>
        <select id="sample-container-type" required>
          <option value="">Select Storage Type *</option>
          <option value="Bag">Bag</option>
          <option value="Box">Box</option>
        </select>



        <!-- Para Box (entidade): selecção de Box -->
        <select id="sample-box" style="display: none;"></select>

        <!-- Para Rack -->
        <select id="sample-rack" style="display: none;"></select>
        <select id="sample-position" style="display: none;">
          <option value="">Select Position</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>

        <textarea placeholder="Observation" id="sample-observation"></textarea>
        <div class="modal-actions">
          <button type="button" id="cancel-form" class="cancel">Cancel</button>
          <button type="submit" class="submit">Save</button>
        </div>
      </form>
    </div>

    <!-- Add Rack Modal -->
    <div class="modal-overlay" id="rack-form-modal">
      <form class="modal-form" id="rack-form">
        <h2>Add Rack</h2>
        <input type="text" id="rack-name" placeholder="Rack Name (A–Z)" required />
        <select id="rack-door" required>
          <option value="">Select Door</option>
        </select>
        <div class="modal-actions">
          <button type="button" id="cancel-rack" class="cancel">Cancel</button>
          <button type="submit" class="submit">Add Rack</button>
        </div>
      </form>
    </div>

    <!-- Add Box Modal -->
    <div class="modal-overlay" id="box-form-modal">
      <form class="modal-form" id="box-form">
        <h2>Add Box</h2>
        <input type="text" id="box-name" placeholder="Box Name (A–Z)" required />
        <select id="box-door" required>
          <option value="">Select Door</option>
        </select>
        <div class="modal-actions">
          <button type="button" id="cancel-box" class="cancel">Cancel</button>
          <button type="submit" class="submit">Add Box</button>
        </div>
      </form>
    </div>

    <!-- Transfer Modal -->
    <div class="modal-overlay" id="transfer-modal">
      <form class="modal-form" id="transfer-form">
        <h2>Transfer Sample</h2>

        <select id="transfer-fridge" required>
          <option value="">Select Fridge</option>
        </select>

        <select id="transfer-door" required>
          <option value="">Select Door</option>
        </select>

        <select id="transfer-type" required>
          <option value="">Select Storage Type</option>
          <option value="Bag">Bag</option>
          <option value="Box">Box</option>
          <option value="Rack">Rack</option>
        </select>

        <textarea id="transfer-observation" placeholder="Observation" style="display: none"></textarea>

        <!-- Rack -->
        <select id="transfer-rack" style="display: none;"></select>
        <select id="transfer-position" style="display: none;">
          <option value="">Select Position</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>

        <!-- Box -->
        <select id="transfer-box" style="display: none;"></select>

        <div class="modal-actions">
          <button type="button" id="cancel-transfer" class="cancel">Cancel</button>
          <button type="submit" class="submit">Confirm Transfer</button>
        </div>
      </form>
    </div>
    <!-- Custom Confirm Modal -->
    <div class="modal-overlay" id="confirm-modal">
      <div class="modal-form" style="max-width:380px;">
        <h2 id="confirm-title">Confirm</h2>
        <p id="confirm-message" style="text-align:center;color:#374151;margin:4px 0 8px;"></p>
        <div class="modal-actions">
          <button id="confirm-cancel-btn" class="cancel">Cancel</button>
          <button id="confirm-ok-btn" class="delete">Confirm</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
